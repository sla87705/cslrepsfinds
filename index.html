<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSL FINDS</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* Variables de design - Style Notion / Airtable (Dark par défaut) */
    :root {
      --bg: #191919;
      --card: #202020;
      --border: #2f2f2f;
      --text: #f4f4f5;
      --muted: #9ca3af;
      --accent: #2eaadc;
      --accent-hover: #1c99c6;
      --bg-tag: rgba(46, 170, 220, 0.15);
      --text-tag: #7dd3fc;
      --input-bg: #252525;
      
      /* Couleur pour le tag vendeur bleu */
      --bg-seller: rgba(37, 99, 235, 0.2);
      --text-seller: #60a5fa;
    }

    /* Thème Clair - Style Notion Pur */
    body.light {
      --bg: #ffffff;
      --card: #fbfbfa;
      --border: #edece9;
      --text: #37352f;
      --muted: #787774;
      --accent: #2383e2;
      --accent-hover: #1a66b8;
      --bg-tag: #e8f4fe;
      --text-tag: #1d72d6;
      --input-bg: #f4f3f0;
      
      --bg-seller: #dbeafe;
      --text-seller: #1e40af;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      transition: background 0.2s ease, color 0.2s ease;
      -webkit-font-smoothing: antialiased;
    }

    /* Barre supérieure (Topbar) */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
      background: rgba(25, 25, 25, 0.85);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 12px 24px;
    }

    body.light .topbar {
      background: rgba(255, 255, 255, 0.85);
    }

    .brand h1 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand p {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 2px;
    }

    /* Zone des Actions (Filtres, Recherche, Thème) */
    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .search-wrapper {
      position: relative;
    }

    input, select, button {
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s ease;
    }

    input:focus, select:focus {
      border-color: var(--accent);
    }

    button {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
    }

    #themeToggle {
      padding: 6px 10px;
    }

    /* Conteneur principal */
    main {
      max-width: 1500px;
      margin: 0 auto;
      padding: 24px 24px;
    }

    /* Sections par Catégorie */
    .category-section {
      margin-bottom: 36px;
    }

    .category-title {
      font-size: 0.95rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .category-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Grille de produits beaucoup plus compacte (Mini-Cartes) */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    /* Carte Produit - Cliquable et épurée */
    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .product-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    }

    body.light .product-card:hover {
      box-shadow: 0 6px 12px rgba(0,0,0,0.05);
    }

    /* Galerie photos compacte */
    .product-images {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      background: rgba(0,0,0,0.02);
      border-bottom: 1px solid var(--border);
    }

    .product-images::-webkit-scrollbar {
      display: none;
    }

    .product-images img {
      width: 100%;
      min-width: 100%;
      height: 140px;
      object-fit: cover;
      scroll-snap-align: start;
      pointer-events: none;
    }

    /* Contenu condensé de la carte */
    .product-content {
      padding: 10px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      gap: 6px;
    }

    .product-title {
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Groupement des tags côte à côte */
    .product-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    /* Tag de catégorie */
    .product-category {
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--bg-tag);
      color: var(--text-tag);
      font-size: 0.7rem;
      font-weight: 600;
    }

    /* Tag de vendeur (Bleu) */
    .product-seller {
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--bg-seller);
      color: var(--text-seller);
      font-size: 0.7rem;
      font-weight: 600;
    }

    /* Design des Overlays / Popups */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      animation: fadeIn 0.2s ease;
    }

    .popup-card {
      width: 90%;
      max-width: 380px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .popup-card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .popup-card p {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.4;
      margin-bottom: 16px;
    }

    .popup-card .popup-sub {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 18px;
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    /* Container de liens de la popup produit */
    .popup-links-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .popup-btn {
      width: 100%;
      text-decoration: none;
      padding: 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      display: block;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .popup-btn:active {
      transform: scale(0.98);
    }

    .popup-btn.bbd {
      background: var(--accent);
      color: #ffffff;
    }

    .popup-btn.bbd:hover {
      background: var(--accent-hover);
    }

    .popup-btn.weidian {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .popup-btn.weidian:hover {
      background: var(--input-bg);
    }

    .popup-close-text {
      display: inline-block;
      margin-top: 16px;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      text-decoration: underline;
    }

    .hidden {
      display: none !important;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 768px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
        padding: 12px;
        gap: 12px;
      }
      .actions {
        width: 100%;
        flex-wrap: wrap;
      }
      .search-wrapper {
        flex-grow: 1;
        width: 100%;
      }
      input, select {
        width: 100%;
      }
      main {
        padding: 16px 12px;
      }
      .products-grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 8px;
      }
      .product-images img {
        height: 110px;
      }
    }
  </style>
</head>
<body>

<div id="tiktokPopup" class="popup-overlay hidden">
  <div class="popup-card">
    <h2>Ouvre le site dans ton navigateur</h2>
    <p>
      Pour une meilleure expérience, ouvre ce site via les <strong>3 petits points</strong> de TikTok puis cliquez sur <strong>“Ouvrir dans le navigateur”</strong>.
    </p>
    <button id="closePopup" style="width: 100%; background: var(--accent); color: white; border: none; padding: 10px; font-weight: 600; border-radius: 6px;">Compris</button>
  </div>
</div>

<div id="productPopup" class="popup-overlay hidden">
  <div class="popup-card">
    <h2 id="popupProductTitle">Nom du Produit</h2>
    <div id="popupProductInfo" class="popup-sub">
      <span id="popupProductCategory">Catégorie</span>
      <span id="popupProductSeller"></span>
    </div>
    
    <div class="popup-links-container">
      <a id="popupBbdLink" class="popup-btn bbd" target="_blank">Ouvrir le lien BBD</a>
      <a id="popupWeidianLink" class="popup-btn weidian" target="_blank">Ouvrir le lien Weidian</a>
    </div>
    
    <span id="closeProductPopup" class="popup-close-text">Fermer</span>
  </div>
</div>

<header class="topbar">
  <div class="brand">
    <h1>CSL FINDS</h1>
    <p>Les meilleurs liens !</p>
  </div>

  <div class="actions">
    <div class="search-wrapper">
      <input type="text" id="searchInput" placeholder="Rechercher un produit..." />
    </div>

    <select id="sellerSelect">
      <option value="all">Tous les vendeurs</option>
    </select>

    <select id="sortSelect">
      <option value="default">Tri par défaut</option>
      <option value="az">Nom : A → Z</option>
      <option value="za">Nom : Z → A</option>
    </select>

    <button id="themeToggle" title="Changer le thème">🌙</button>
  </div>
</header>

<main>
  <div id="categoryContainer"></div>
</main>

<template id="productTemplate">
  <div class="product-card">
    <div class="product-images"></div>
    <div class="product-content">
      <h3 class="product-title"></h3>
      <div class="product-tags">
        <span class="product-category"></span>
        <span class="product-seller hidden"></span>
      </div>
    </div>
  </div>
</template>

<script>
const categoryContainer = document.getElementById("categoryContainer");
const template = document.getElementById("productTemplate");
const searchInput = document.getElementById("searchInput");
const sellerSelect = document.getElementById("sellerSelect");
const sortSelect = document.getElementById("sortSelect");
const themeToggle = document.getElementById("themeToggle");

// Éléments de la popup produit
const productPopup = document.getElementById("productPopup");
const popupProductTitle = document.getElementById("popupProductTitle");
const popupProductCategory = document.getElementById("popupProductCategory");
const popupProductSeller = document.getElementById("popupProductSeller");
const popupBbdLink = document.getElementById("popupBbdLink");
const popupWeidianLink = document.getElementById("popupWeidianLink");
const closeProductPopup = document.getElementById("closeProductPopup");

let products = [];

// -------- TikTok Detection --------
(function detectTikTokBrowser() {
  const alreadySeen = localStorage.getItem("tiktokPopupSeen");
  if (alreadySeen) return;

  const ua = navigator.userAgent || navigator.vendor || window.opera;
  const isTikTok = ua.includes("TikTok") || ua.includes("musical_ly");

  if (isTikTok) {
    const popup = document.getElementById("tiktokPopup");
    popup.classList.remove("hidden");

    document.getElementById("closePopup").addEventListener("click", () => {
      popup.classList.add("hidden");
      localStorage.setItem("tiktokPopupSeen", "true");
    });
  }
})();

// -------- Gestion du Thème --------
(function loadTheme() {
  const saved = localStorage.getItem("theme");
  if (saved === "light") {
    document.body.classList.add("light");
    themeToggle.textContent = "☀️";
  } else {
    themeToggle.textContent = "🌙";
  }
})();

themeToggle.addEventListener("click", () => {
  document.body.classList.toggle("light");
  const isLight = document.body.classList.contains("light");
  themeToggle.textContent = isLight ? "☀️" : "🌙";
  localStorage.setItem("theme", isLight ? "light" : "dark");
});

// -------- Gestion Ouverture de la Popup Produit --------
function openLinksPopup(product) {
  popupProductTitle.textContent = product.name;
  popupProductCategory.textContent = `Catégorie : ${product.category}`;
  
  if (product.seller) {
    popupProductSeller.textContent = `• Vendeur : ${product.seller}`;
    popupProductSeller.classList.remove("hidden");
  } else {
    popupProductSeller.classList.add("hidden");
  }
  
  popupBbdLink.href = product.bbd;
  popupWeidianLink.href = product.weidian;
  
  productPopup.classList.remove("hidden");
}

// Événements de fermeture de la popup produit
closeProductPopup.addEventListener("click", () => productPopup.classList.add("hidden"));
productPopup.addEventListener("click", (e) => {
  if (e.target === productPopup) productPopup.classList.add("hidden");
});

// -------- Chargement et Parsing Automatique --------
async function loadData() {
  try {
    const categoriesText = await fetch("categorie.txt?t=" + Date.now()).then(res => res.text());
    const productsText = await fetch("Produit.txt?t=" + Date.now()).then(res => res.text());
    
    // Chargement optionnel du fichier vendeur.txt
    let sellers = [];
    try {
      const sellersText = await fetch("vendeur.txt?t=" + Date.now()).then(res => res.text());
      const cleanSellersText = sellersText.replace(/[\r\n]/g, "").trim();
      sellers = cleanSellersText.split("#").map(s => s.trim()).filter(Boolean);
      
      // Remplissage dynamique du menu de sélection des vendeurs
      sellers.forEach(seller => {
        const option = document.createElement("option");
        option.value = seller;
        option.textContent = seller;
        sellerSelect.appendChild(option);
      });
    } catch(e) {
      console.warn("Fichier vendeur.txt absent ou illisible. Mode sans filtre vendeur activé.");
    }

    const cleanCategoriesText = categoriesText.replace(/[\r\n]/g, "").trim();
    const cleanProductsText = productsText.replace(/[\r\n]/g, "").trim();

    const categories = cleanCategoriesText
      .split("#")
      .map(cat => cat.trim())
      .filter(Boolean);

    parseProducts(cleanProductsText, categories, sellers);
    renderProducts(products);
  } catch (err) {
    console.error("Erreur de chargement général", err);
  }
}

function parseProducts(text, validCategories, validSellers) {
  const blocks = text.split("##").map(b => b.trim()).filter(Boolean);
  products = [];

  blocks.forEach(block => {
    const infos = block.split("#").map(i => i.trim());
    
    if (infos.length < 5) return;

    const category = infos[0];
    const name = infos[1];
    const images = infos[2].split(",").map(img => img.trim()).filter(Boolean);
    const bbd = infos[3];
    const weidian = infos[4];
    
    // Le 6ème élément (vendeur) est optionnel
    let seller = infos[5] || "";
    
    // Sécurité de filtrage : si un fichier vendeur existe et qu'il y a un vendeur, on vérifie la cohérence
    if (validSellers.length > 0 && seller && !validSellers.includes(seller)) {
      seller = ""; // réinitialise s'il n'est pas déclaré dans vendeur.txt
    }

    if (!validCategories.includes(category)) return;

    products.push({ category, name, images, bbd, weidian, seller });
  });
}

// -------- Rendu graphique --------
function renderProducts(data) {
  categoryContainer.innerHTML = "";
  
  if (data.length === 0) {
    categoryContainer.innerHTML = "<p style='text-align:center; color:var(--muted); margin-top:40px;'>Aucun produit trouvé.</p>";
    return;
  }

  const grouped = {};
  data.forEach(product => {
    if (!grouped[product.category]) grouped[product.category] = [];
    grouped[product.category].push(product);
  });

  Object.keys(grouped).forEach(category => {
    const section = document.createElement("section");
    section.className = "category-section";

    const title = document.createElement("h2");
    title.className = "category-title";
    title.textContent = category;

    const grid = document.createElement("div");
    grid.className = "products-grid";

    grouped[category].forEach(product => {
      const clone = template.content.cloneNode(true);
      const cardElement = clone.querySelector(".product-card");

      clone.querySelector(".product-title").textContent = product.name;
      clone.querySelector(".product-category").textContent = product.category;

      // Gestion de l'affichage dynamique du tag vendeur en bleu
      const sellerTag = clone.querySelector(".product-seller");
      if (product.seller) {
        sellerTag.textContent = product.seller;
        sellerTag.classList.remove("hidden");
      }

      const imagesContainer = clone.querySelector(".product-images");
      product.images.forEach(url => {
        const img = document.createElement("img");
        img.src = url;
        img.loading = "lazy";
        imagesContainer.appendChild(img);
      });

      cardElement.addEventListener("click", () => openLinksPopup(product));

      grid.appendChild(clone);
    });

    section.appendChild(title);
    section.appendChild(grid);
    categoryContainer.appendChild(section);
  });
}

// -------- Recherche, Tri & Filtrage par Vendeur --------
function filterAndSort() {
  const searchValue = searchInput.value.toLowerCase();
  const sellerValue = sellerSelect.value;
  
  // 1. Filtrage combiné (Recherche textuelle + Menu vendeur)
  let filtered = products.filter(product => {
    const matchesSearch = product.name.toLowerCase().includes(searchValue);
    const matchesSeller = (sellerValue === "all") || (product.seller === sellerValue);
    return matchesSearch && matchesSeller;
  });

  // 2. Tri alphabétique
  const sort = sortSelect.value;
  if (sort === "az") {
    filtered.sort((a, b) => a.name.localeCompare(b.name));
  } else if (sort === "za") {
    filtered.sort((a, b) => b.name.localeCompare(a.name));
  }

  renderProducts(filtered);
}

searchInput.addEventListener("input", filterAndSort);
sellerSelect.addEventListener("change", filterAndSort);
sortSelect.addEventListener("change", filterAndSort);

loadData();
</script>
</body>
</html>
